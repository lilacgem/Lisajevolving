<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LisajEvokes Space</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%); }
        #branding {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 2.5rem;
            letter-spacing: 2rem;
            z-index: 10;
            pointer-events: none;
            filter: blur(1px);
            animation: pulse 8s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; filter: blur(2px); transform: translate(-50%, -50%) scale(0.95); }
            50% { opacity: 0.9; filter: blur(0px); transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>
    <div id="branding">LISAJEVOLVE</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Bio-Frequency Particles
        const geo = new THREE.BufferGeometry();
        const count = 3000;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for(let i=0; i<count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
            colors[i] = Math.random(); // Randomizing "frequency" colors
        }
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const mat = new THREE.PointsMaterial({
            size: 0.03,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending // Makes them "glow" when they overlap
        });

        const points = new THREE.Points(geo, mat);
        scene.add(points);
        camera.position.z = 3;

        function animate() {
            requestAnimationFrame(animate);
            // Resonant Movement
            const time = Date.now() * 0.0001;
            points.rotation.y = time * 0.5;
            points.rotation.x = Math.sin(time) * 0.2;
            
            // Simulating a "Breathing" frequency
            mat.size = 0.02 + Math.sin(Date.now() * 0.002) * 0.01;
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
