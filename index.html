<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LISAJEVOKES SPACE</title>
    <style>
        /* 🌌 Deep Void Base Setup */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #020005;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            color: #ffffff;
        }

        /* 🎬 Background Video Engine - Layered to blend perfectly */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -3; 
            display: block;
            opacity: 0.85; /* Softened slightly to blend with the glowing particle stream */
            pointer-events: none;
        }

        /* 🟣 Velvet Ambient Gradient Wash over the video */
        .ambient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 75% 50%, rgba(20, 5, 35, 0.15) 0%, rgba(2, 0, 5, 0.75) 100%);
            z-index: -2;
            pointer-events: none;
        }

        /* 🪐 Three.js Particle Layer */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* 🛡️ Balanced Content Presentation Layout */
        .ui-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            pointer-events: none;
            display: flex;
            justify-content: flex-end; /* Right-aligned presentation matching your setup */
            align-items: center;
            padding: 60px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .presentation-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 440px;
            width: 100%;
            gap: 25px;
            text-align: center;
            animation: fadeIn 2s ease-out;
        }

        /* 🔮 Breathing Neon Portrait Presentation Component */
        .orb-shell {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 240px;
            height: 240px;
            margin: 0 auto;
        }

        #aura-primary {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(216, 180, 254, 0.5) 0%, rgba(168, 85, 247, 0.2) 60%, transparent 100%);
            z-index: 1;
            filter: blur(12px);
            animation: auraBreathe 4s infinite ease-in-out alternate;
        }

        #aura-secondary {
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.3) 0%, rgba(139, 92, 246, 0.05) 70%, transparent 100%);
            z-index: 1;
            filter: blur(24px);
            animation: auraBreathe 6s infinite ease-in-out alternate-reverse;
        }

        #profile-image {
            width: 155px;
            height: 155px;
            border-radius: 50%;
            z-index: 2;
            background-image: url('me.png'), url('me.jpg'), url('profile.png'), url('profile.jpg'), linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            background-size: cover;
            background-position: center;
            border: 2.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 45px rgba(0, 0, 0, 0.8), 0 0 30px rgba(168, 85, 247, 0.2);
        }

        /* ✨ Soft Pink Flair Nodes */
        .aura-flair {
            position: absolute;
            width: 7px;
            height: 7px;
            background-color: #ec4899;
            border-radius: 50%;
            box-shadow: 0 0 14px #ec4899, 0 0 25px #a855f7;
            z-index: 3;
        }
        .flair-1 { top: 16%; left: 16%; }
        .flair-2 { bottom: 20%; right: 12%; }

        /* ✍️ Clean Display Typography */
        .portal-title-block {
            margin-top: 5px;
        }

        h1 {
            color: #ffffff;
            font-size: 3.4rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0;
            letter-spacing: -0.03em;
            text-shadow: 0 4px 25px rgba(0, 0, 0, 0.9);
        }

        /* 🚪 Audio Initialization Entry Overlay Curtain */
        #audio-gate-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #020005;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), visibility 1.2s;
        }

        .gate-prompt {
            font-family: monospace;
            color: rgba(216, 180, 254, 0.6);
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            animation: pulseText 2.5s infinite ease-in-out;
        }

        /* 🔄 Fluid Animation Keyframes */
        @keyframes auraBreathe {
            0% { transform: scale(0.92); opacity: 0.6; }
            100% { transform: scale(1.08); opacity: 0.9; filter: blur(16px); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 0.9; transform: scale(1.02); color: #ffffff; text-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="audio-gate-overlay" onclick="initializeResonanceSpace()">
        <div class="gate-prompt">LISTEN TO ENTRY</div>
    </div>

    <video loop playsinline id="bg-video">
        <source src="lilac gem.mp4" type="video/mp4">
    </video>

    <div class="ambient-overlay"></div>

    <div class="ui-container">
        <div class="presentation-column">
            
            <div class="orb-shell">
                <div id="aura-secondary"></div>
                <div id="aura-primary"></div>
                <div class="aura-flair flair-1"></div>
                <div class="aura-flair flair-2"></div>
                <div id="profile-image"></div>
            </div>
            
            <div class="portal-title-block">
                <h1>LisajEvokes Space</h1>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 🚪 Seamlessly starts video stream with full native audio when overlay is clicked
        function initializeResonanceSpace() {
            const overlay = document.getElementById('audio-gate-overlay');
            const video = document.getElementById('bg-video');
            
            overlay.style.opacity = '0';
            overlay.style.visibility = 'hidden';
            
            // Explicitly play video unmuted once user triggers interaction permission
            video.muted = false;
            video.play().catch(err => console.log("Video playback handled:", err));
        }

        // 🪐 High-Fidelity Fluid Particle Generator Engine
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const count = 2500;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        // Generates beautiful shades of cosmic Lilac, Soft Violet, and Pale Magenta
        for(let i = 0; i < count; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 8;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 8;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 5;

            // Blended Lilac / Lavender spectrum logic
            colors[i * 3] = 0.6 + Math.random() * 0.4;     // R: High pink presence
            colors[i * 3 + 1] = 0.4 + Math.random() * 0.3; // G: Subtle variation
            colors[i * 3 + 2] = 0.9 + Math.random() * 0.1; // B: High purple depth
        }
        
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const mat = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            transparent: true,
            opacity: 0.55,
            blending: THREE.AdditiveBlending
        });

        const points = new THREE.Points(geo, mat);
        scene.add(points);
        camera.position.z = 3.5;

        // Fluid Breathing Animation Handler Loop
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.00004;
            
            // Gentle drifting rotation physics
            points.rotation.y = time * 0.4;
            points.rotation.x = Math.sin(time * 0.5) * 0.15;
            
            // Continuous particle size modulation mimicking cosmic wave breathing
            mat.size = 0.025 + Math.sin(Date.now() * 0.0015) * 0.012;
            
            renderer.render(scene, camera);
        }
        animate();

        // Screen Scale Auto-Adjustment Trigger
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
