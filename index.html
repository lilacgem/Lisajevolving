<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Resonance Canvas</title>
    <style>
        /* Complete elimination of standard UI, banners, and scrollbars */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Removes the default cursor for pure immersion */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* Ethereal Ambient Lighting Canvas */
        #ambient-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: background 0.1s ease;
            background: radial-gradient(circle at 50% 50%, rgba(13, 13, 25, 1) 0%, rgba(5, 5, 8, 1) 100%);
        }

        /* Subtle Interactive Overlay to kickstart AudioContext */
        #interaction-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 8, 0.95);
            color: rgba(255, 255, 255, 0.3);
            font-weight: 200;
            letter-spacing: 4px;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: opacity 1.5s ease;
            cursor: pointer;
        }

        /* Hidden audio element */
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Ambient background layer driven by audio frequencies -->
    <div id="ambient-glow"></div>

    <!-- Minimal overlay purely to comply with browser autoplay security -->
    <div id="interaction-shield" onclick="initializeResonance()">
        [ Click to enter your space ]
    </div>

    <!-- Your personal audio file -->
    <audio id="personal-audio" src="aujoulevol.mp4" loop></audio>

    <script>
        function initializeResonance() {
            const shield = document.getElementById('interaction-shield');
            const audio = document.getElementById('personal-audio');
            const glow = document.getElementById('ambient-glow');

            // Fade out the initialization text completely
            shield.style.opacity = '0';
            setTimeout(() => shield.remove(), 1500);

            // Set up strict low-volume playback
            audio.volume = 0.15; // Subtle, low volume
            audio.play();

            // Web Audio API Context Setup
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();
            const track = audioCtx.createMediaElementSource(audio);
            
            // Create the spectral analyzer
            const analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 256; // High resolution spectral bins
            
            track.connect(analyzer);
            analyzer.connect(audioCtx.destination);

            const bufferLength = analyzer.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            // Spectral Resonance Render Loop
            function renderResonance() {
                requestAnimationFrame(renderResonance);
                
                // Fetch deep audio frame data
                analyzer.getByteFrequencyData(dataArray);

                // Segment the spectrum into Bass, Mids, and Highs
                let bass = 0;
                let mids = 0;
                let highs = 0;

                for (let i = 0; i < bufferLength; i++) {
                    if (i < bufferLength * 0.2) {
                        bass += dataArray[i];
                    } else if (i < bufferLength * 0.7) {
                        mids += dataArray[i];
                    } else {
                        highs += dataArray[i];
                    }
                }

                // Normalize values based on bin distributions
                bass = bass / (bufferLength * 0.2);
                mids = mids / (bufferLength * 0.5);
                highs = highs / (bufferLength * 0.3);

                // Map audio metrics directly to ethereal colors
                // Bass controls deep rich hues (Hue), Mids control saturation/vibrancy, Highs control brightness
                const hue1 = Math.floor((bass * 1.2) % 360);
                const hue2 = Math.floor(((mids * 0.8) + 180) % 360);
                const saturation = 40 + (mids * 0.2); // Kept low/subtle for an ethereal vibe
                const lightness = 8 + (highs * 0.08);  // Soft glow intensity

                // Dynamically update the entire site's lighting gradient based on complete audio frames
                glow.style.background = `radial-gradient(circle at 50% 50%, 
                    hsl(${hue1}, ${saturation}%, ${lightness + 10}%) 0%, 
                    hsl(${hue2}, ${saturation - 10}%, ${lightness}%) 50%, 
                    hsl(240, 20%, 3%) 100%)`;
            }

            renderResonance();
        }
    </script>
</body>
</html>
