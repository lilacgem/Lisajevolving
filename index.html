<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aujoule Evol | Flow State Resonance</title>
    <style>
        /* 🌌 Deep Ambient Core Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030108;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* 🖼️ Abstract Background Blur Glow Track */
        .background-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.12) 0%, rgba(2, 0, 5, 0.9) 80%);
            z-index: -1;
        }

        /* 🛡️ Professional Glassmorphic Player Container Card */
        .player-card {
            background: rgba(15, 8, 28, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7),
                        0 0 30px rgba(168, 85, 247, 0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 📸 Cinematic Image Container Frame */
        .art-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .art-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        /* Ambient Pulsing Glow when active */
        .player-card.playing .art-frame img {
            transform: scale(1.03);
        }

        /* 🕹️ Custom Controls Engine Layout */
        .controls-inner {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .play-trigger-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease-out;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.2);
            flex-shrink: 0;
        }

        .play-trigger-btn:hover {
            transform: scale(1.05);
            background: #cbd5e1;
        }

        .play-trigger-btn svg {
            fill: #030108;
            width: 20px;
            height: 20px;
            transition: transform 0.1s ease;
        }

        /* 🧭 Fluid Wave Timeline Tracker Bar */
        .timeline-track {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .progress-wrapper {
            position: relative;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ec4899, #a855f7);
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.6);
            position: relative;
        }

        .time-readout {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 0.68rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }

        /* 📋 High-End Monospace Metadata Matrix Box */
        .metadata-grid {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-family: monospace;
            text-align: left;
        }

        .meta-node {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-label {
            font-size: 0.58rem;
            color: rgba(216, 180, 254, 0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .meta-value {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <audio id="audio-engine" src="aujoulevol.mp3" preload="metadata"></audio>

    <div class="player-card" id="master-card">
        
        <div class="art-frame">
            <img src="aujoulevo.jpg" alt="Aujoule Evol Profile Canvas">
        </div>

        <div class="controls-inner">
            <button class="play-trigger-btn" id="play-btn" onclick="togglePlaybackTrack()">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <div class="timeline-track">
                <div class="progress-wrapper" id="timeline-seek" onclick="manualSeekAudio(event)">
                    <div class="progress-fill" id="progress-bar-fill"></div>
                </div>
                <div class="time-readout">
                    <span id="time-current">0:00</span>
                    <span id="time-duration">0:00</span>
                </div>
            </div>
        </div>

        <div class="metadata-grid">
            <div class="meta-node">
                <span class="meta-label">Source</span>
                <span class="meta-value">AuEvoAujoulEvol L.L.C</span>
            </div>
            <div class="meta-node">
                <span class="meta-label">Source System</span>
                <span class="meta-value">LisajEvokes</span>
            </div>
            <div class="meta-node">
                <span class="meta-label">Capture State</span>
                <span class="meta-value">Flow</span>
            </div>
            <div class="meta-node">
                <span class="meta-label">Core Frequency</span>
                <span class="meta-value">Evo</span>
            </div>
        </div>

    </div>

    <script>
        const audio = document.getElementById('audio-engine');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const timeCurrent = document.getElementById('time-current');
        const timeDuration = document.getElementById('time-duration');
        const masterCard = document.getElementById('master-card');
        const timelineSeek = document.getElementById('timeline-seek');

        // Toggle Play/Pause Tracks smoothly
        function togglePlaybackTrack() {
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                masterCard.classList.add('playing');
            } else {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                masterCard.classList.remove('playing');
            }
        }

        // Formats technical raw values into readable minutes:seconds
        function formatTrackTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Set structural metadata timestamps when loading is completed
        audio.addEventListener('loadedmetadata', () => {
            timeDuration.textContent = formatTrackTime(audio.duration);
        });

        // Monitors time modification steps to update timeline metrics live
        audio.addEventListener('timeupdate', () => {
            const percentage = (audio.currentTime / audio.duration) * 100;
            progressBarFill.style.width = `${percentage}%`;
            timeCurrent.textContent = formatTrackTime(audio.currentTime);
        });

        // Handles manual clicks on track paths to change playback positioning
        function manualSeekAudio(event) {
            const rect = timelineSeek.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const width = rect.width;
            const seekPercentage = clickX / width;
            audio.currentTime = seekPercentage * audio.duration;
        }

        // Automatically resets layout tracking values once song sequence terminates
        audio.addEventListener('ended', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            masterCard.classList.remove('playing');
            progressBarFill.style.width = '0%';
            timeCurrent.textContent = '0:00';
        });
    </script>
</body>
</html>
