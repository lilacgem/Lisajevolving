<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LisajEvokes Space</title>
    <style>
        /* 🌌 Deep Cosmic Void Base */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #020005;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            color: #ffffff;
        }

        /* 🎬 Background Video Engine - Fixed to display instantly */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -3; 
            display: block;
            opacity: 0.9;
            pointer-events: none;
        }

        /* 🟣 Velvet Dark Ambient Glow Overlay */
        .ambient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 75% 50%, rgba(20, 5, 35, 0.1) 0%, rgba(2, 0, 5, 0.7) 100%);
            z-index: -2;
            pointer-events: none;
        }

        /* 🪐 Three.js Cosmic Particle Canvas */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* 🛡️ Restored Elegant Layout - Locked to the right side exactly like the mockup */
        .ui-container {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: flex-end; /* Pushes content beautifully to the right side */
            align-items: center;
            padding-right: 10%; /* Creates the elegant side spacing */
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }

        .presentation-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 400px;
            gap: 20px;
            text-align: center;
            pointer-events: auto; /* Allows users to click text area to activate audio */
        }

        /* 🔮 Breathing Neon Portrait Aura Rings */
        .orb-shell {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 240px;
            height: 240px;
            margin: 0 auto;
        }

        #aura-primary {
            position: absolute;
            width: 175px;
            height: 175px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(216, 180, 254, 0.5) 0%, rgba(168, 85, 247, 0.2) 60%, transparent 100%);
            z-index: 1;
            filter: blur(12px);
            animation: auraBreathe 4s infinite ease-in-out alternate;
        }

        #aura-secondary {
            position: absolute;
            width: 235px;
            height: 235px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.35) 0%, rgba(139, 92, 246, 0.05) 70%, transparent 100%);
            z-index: 1;
            filter: blur(22px);
            animation: auraBreathe 6s infinite ease-in-out alternate-reverse;
        }

        #profile-image {
            width: 155px;
            height: 155px;
            border-radius: 50%;
            z-index: 2;
            /* Gracefully checks for all potential naming variations of your uploaded image asset */
            background-image: url('me.png'), url('me.jpg'), url('profile.png'), url('profile.jpg'), linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.85), 0 0 25px rgba(168, 85, 247, 0.25);
        }

        /* ✨ Soft Pink Glowing Perimeters */
        .aura-flair {
            position: absolute;
            width: 7px;
            height: 7px;
            background-color: #ec4899;
            border-radius: 50%;
            box-shadow: 0 0 12px #ec4899, 0 0 20px #a855f7;
            z-index: 3;
        }
        .flair-1 { top: 15%; left: 16%; }
        .flair-2 { bottom: 22%; right: 14%; }

        /* ✍️ Typography */
        .portal-title-block {
            margin-top: 5px;
        }

        h1 {
            color: #ffffff;
            font-size: 3.4rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0;
            letter-spacing: -0.03em;
            text-shadow: 0 4px 25px rgba(0, 0, 0, 0.9);
        }

        /* 🔄 Dynamic Animations */
        @keyframes auraBreathe {
            0% { transform: scale(0.94); opacity: 0.6; }
            100% { transform: scale(1.06); opacity: 0.95; filter: blur(14px); }
        }
    </style>
</head>
<body onclick="activateAudio resonance()">

    <video autoplay loop muted playsinline id="bg-video">
        <source src="lilac%20gem.mp4" type="video/mp4">
        <source src="lilac gem.mp4" type="video/mp4">
    </video>

    <div class="ambient-overlay"></div>

    <div class="ui-container">
        <div class="presentation-column">
            
            <div class="orb-shell">
                <div id="aura-secondary"></div>
                <div id="aura-primary"></div>
                <div class="aura-flair flair-1"></div>
                <div class="aura-flair flair-2"></div>
                <div id="profile-image"></div>
            </div>
            
            <div class="portal-title-block">
                <h1>LisajEvokes Space</h1>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 🔊 Unmutes the video automatically on first click anywhere on screen
        function activateAudio() {
            const video = document.getElementById('bg-video');
            if (video) {
                video.muted = false;
            }
        }
        // Bind to screen click events safely
        window.addEventListener('click', activateAudio);

        // 🪐 Upgraded Fluid Particle Engine (Lilac / Lavender spectrum nodes)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const count = 2000;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for(let i = 0; i < count; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 8;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 8;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 4;

            // Fluid Lilac color spectrum logic
            colors[i * 3] = 0.7 + Math.random() * 0.3;     // Red
            colors[i * 3 + 1] = 0.4 + Math.random() * 0.3; // Green
            colors[i * 3 + 2] = 0.9 + Math.random() * 0.1; // Blue
        }
        
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const mat = new THREE.PointsMaterial({
            size: 0.035,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const points = new THREE.Points(geo, mat);
        scene.add(points);
        camera.position.z = 3.2;

        // Continuous fluid breathing cycle loop
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.00005;
            
            points.rotation.y = time * 0.3;
            points.rotation.x = Math.sin(time * 0.4) * 0.12;
            
            mat.size = 0.022 + Math.sin(Date.now() * 0.0018) * 0.01;
            
            renderer.render(scene, camera);
        }
        animate();

        // Responsive window auto-resize handler
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
